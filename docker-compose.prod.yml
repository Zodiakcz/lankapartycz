services:
  server:
    image: ghcr.io/zodiakcz/lankapartycz/server:latest
    environment:
      - DATABASE_URL=file:/data/lankaparty.db
      - SESSION_SECRET=${SESSION_SECRET:-change-this-in-production}
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - db-data:/data
    restart: unless-stopped

  client:
    image: ghcr.io/zodiakcz/lankapartycz/client:latest
    depends_on:
      - server
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - client
    restart: unless-stopped

volumes:
  db-data:
  caddy-data:
  caddy-config:
